<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>SmartDocQA - 智能文档问答助手</title>
  <link rel="stylesheet" href="/static/css/style.css?v=3.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" async></script>
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">📄</div>
          <div class="logo-text">
            <h2>SmartDocQA</h2>
            <span>Intelligent Document Q&A</span>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav" id="domain-nav">
        <div class="nav-section-label">领域选择</div>
        <button class="domain-item active" data-domain="enterprise" onclick="selectDomain('enterprise')">
          <span class="nav-icon">🏢</span> 企业助手
        </button>
        <button class="domain-item" data-domain="research" onclick="selectDomain('research')">
          <span class="nav-icon">🔬</span> 科研助手
        </button>
        <button class="domain-item disabled" data-domain="legal" title="即将推出">
          <span class="nav-icon">⚖️</span> 法律助手 <span class="dev-badge">开发中</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <span class="status-dot"></span>
        <span>LangChain + FAISS + FastAPI</span>
      </div>
    </aside>

    <!-- Main Panel -->
    <main class="main-panel">
      
        <!-- History Panel (slide-in from right) -->
        <div class="history-panel" id="history-panel">
          <div class="history-panel-header">
            <h3>📜 问答历史</h3>
            <button class="btn-icon" onclick="toggleHistoryPanel()">✕</button>
          </div>
          <div class="history-panel-body" id="history-panel-body">
            <div class="empty-state"><p>暂无问答记录</p></div>
          </div>
        </div>
        <!-- Preview Modal -->
        <div class="preview-overlay" id="preview-modal" style="display:none;">
          <div class="preview-card">
            <div class="preview-header">
              <h3 style="font-size:14px;font-weight:600;" id="preview-title">文档预览</h3>
              <button class="btn-icon" onclick="document.getElementById('preview-modal').style.display='none'">✕</button>
            </div>
            <div class="preview-body" id="preview-content">
              <div class="empty-state"><p>⏳ 加载中...</p></div>
            </div>
          </div>
        </div>
        <!-- Processing Modal -->
        <div class="processing-overlay" id="processing-modal" style="display:none;">
          <div class="processing-card">
            <div class="processing-icon">⚙️</div>
            <h3 id="processing-title">正在处理文档...</h3>
            <p id="processing-filename"></p>
            <div class="processing-stages" id="processing-stages">
              <div class="stage" data-stage="read"><span class="stage-icon">○</span><span class="stage-text">读取文件内容</span></div>
              <div class="stage" data-stage="split"><span class="stage-icon">○</span><span class="stage-text">智能文本分割</span></div>
              <div class="stage" data-stage="embed"><span class="stage-icon">○</span><span class="stage-text">AI 向量嵌入</span></div>
              <div class="stage" data-stage="store"><span class="stage-icon">○</span><span class="stage-text">构建检索索引</span></div>
            </div>
            <div class="processing-progress"><div class="processing-bar" id="processing-bar"></div></div>
            <p class="processing-hint">处理速度取决于文档大小和 AI 服务响应时间</p>
          </div>
        </div>

<!-- Top Bar -->
      <header class="top-bar">
        <h1 id="page-title">🏢 企业助手</h1>
        <div class="top-bar-right">
          <button class="btn btn-secondary btn-sm" id="theme-toggle-btn" onclick="toggleTheme()" title="切换暗色/亮色模式">☀️</button>
          <span id="doc-count-badge" class="badge badge-primary">请选择知识库</span>
          <span class="badge badge-success">v2.3</span>
        </div>
      </header>

      <!-- Content Area -->
      <div class="content-area">
        <!-- Left Column -->
        <div class="column-left" id="column-left">


                    <!-- Hidden Upload -->
          <input type="file" id="file-input" accept=".pdf,.txt,.md,.csv" style="display:none;">

          <!-- Knowledge Base Section -->
          <div class="card" style="margin-bottom:12px;">
            <div class="card-header">
              <span class="card-title"><span class="icon">📚</span> Knowledge Bases</span>
              <div style="display:flex;gap:6px;">
                <button class="btn btn-primary btn-sm" onclick="showCreateKBModal()">＋ 新建</button>
              </div>
            </div>
            <!-- KB Selector Dropdown -->
            <div class="kb-selector" id="kb-selector">
              <button class="kb-selector-btn" onclick="toggleKbDropdown(event)">
                <span class="kb-selector-label" id="kb-selector-label">请选择知识库</span>
                <span class="kb-selector-arrow">▾</span>
              </button>
              <div class="kb-dropdown" id="kb-dropdown">
                <div id="kb-dropdown-kbs"></div>
              </div>
            </div>
            <div id="kb-list" class="kb-list" style="display:none;">
              <div class="empty-state" style="padding:8px;font-size:12px;text-align:center;opacity:0.6;">暂无知识库</div>
            </div>
          </div>

          <!-- Document List Card -->
          <div class="card" id="doc-card" style="flex:1;min-height:0;display:flex;flex-direction:column;">
            <div class="card-header">
              <span class="card-title"><span class="icon">📋</span> 我的文档 <span id="doc-count-inline" style="font-size:12px;opacity:0.5;margin-left:4px;"></span></span>
              <div style="display:flex;gap:6px;">
                <button class="btn btn-secondary btn-sm" onclick="refreshDocs()">🔄 刷新</button>
                <button class="btn btn-primary btn-sm" id="btn-upload" onclick="triggerUpload()">
                  <span class="btn-upload-text">上传</span>
                </button>
              </div>
            </div>
            <div class="doc-list" id="doc-list">
              <div class="empty-state">
                <div class="empty-icon">📭</div>
                <p>暂无文档，请上传你的第一个文档</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Column - Chat Area -->
        <div class="column-right" id="column-right">
          <div class="chat-container" id="chat-container">
            <div class="chat-header">
              <div class="chat-header-info">
                <h3 id="chat-doc-name">选择知识库开始对话</h3>
                <p id="chat-doc-status">请先选择或创建一个知识库</p>
              </div>
              <button class="btn btn-secondary btn-sm" onclick="clearChat()">🗑️ 清空对话</button>
              <button class="btn btn-secondary btn-sm" onclick="toggleHistoryPanel()" title="问答历史">📜 对话历史</button>
            </div>
            <div class="chat-messages" id="chat-messages">
            </div>
            <div class="chat-input-area">
              <textarea
                id="chat-input"
                placeholder="输入你的问题，AI 将从文档中智能检索答案..."
                rows="1"
                onkeydown="handleChatKeydown(event)"
                disabled
              ></textarea>
              <button class="btn-send" id="btn-send" onclick="sendMessage()" disabled>➤</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/js/app.js?v=4.1"></script>
</body>
</html>
